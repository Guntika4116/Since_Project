<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Sarabun', sans-serif; padding: 10px; }
        .card { border-radius: 15px; border: none; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08); }
        .section-title { background: #1a73e8; color: white; padding: 10px 15px; border-radius: 8px; margin: 20px 0 15px 0; font-size: 0.95rem; font-weight: 600; }
        .form-label { font-weight: 500; color: #444; font-size: 0.9rem; }
        .btn-submit { background-color: #1aa260; color: white; font-weight: 600; padding: 12px; border-radius: 10px; transition: 0.3s; width: 100%; border: none; }
        .logo-container { text-align: center; margin-top: 10px; margin-bottom: 20px; }
        .logo-img { max-width: 120px; height: auto; filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.1)); }
    </style>
</head>
<body>
    <div class="container pb-5">
        <div class="card mt-3">
            <div class="card-body">
                <div class="logo-container">
                    <img src="https://i.postimg.cc/wvzd1LqR/logo-BDS-Background-Removed.png" alt="Logo" class="logo-img">
                </div>
                <h4 class="text-center text-primary mb-4">โครงการส่งเสริมผู้ประกอบการผ่านระบบ BDS</h4>
                <form id="regForm">
                    <div class="section-title">ส่วนที่ 1: ข้อมูลส่วนตัว</div>
                    <div class="mb-3">
                        <label class="form-label">เลขประจำตัวประชาชน (13 หลัก)</label>
                        <input type="text" class="form-control" name="id_card" pattern="[0-9]{13}" required>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3"><label class="form-label">ชื่อ</label><input type="text" class="form-control" name="first_name" required></div>
                        <div class="col-6 mb-3"><label class="form-label">นามสกุล</label><input type="text" class="form-control" name="last_name" required></div>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3"><label class="form-label">เบอร์โทรศัพท์</label><input type="tel" class="form-control" name="phone" required></div>
                        <div class="col-6 mb-3"><label class="form-label">อีเมล</label><input type="email" class="form-control" name="email"></div>
                    </div>

                    <div class="section-title">ส่วนที่ 2: ข้อมูลธุรกิจ</div>
                    <div class="mb-3"><label class="form-label">ชื่อกิจการ</label><input type="text" class="form-control" name="company" required></div>
                    <div class="mb-3"><label class="form-label">จังหวัดที่ตั้งกิจการ</label><input type="text" class="form-control" name="province" required></div>
                    <div class="mb-3"><label class="form-label">เลขทะเบียนกิจการ</label><input type="text" class="form-control" name="tax_id" required></div>

                    <div class="mb-3">
                        <label class="form-label d-block">เลข SME One ID</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="sme_status" value="ไม่มี" checked onclick="toggleSme(false)">
                            <label class="form-check-label">ไม่มี</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="sme_status" value="มี" onclick="toggleSme(true)">
                            <label class="form-check-label">มี</label>
                        </div>
                        <div id="sme_input_div" class="mt-2" style="display: none;">
                            <input type="text" class="form-control" name="sme_number" placeholder="กรอกเลข SME One ID">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">ข้อมูล TSIC ภาคธุรกิจ</label>
                        <select class="form-select" name="tsic" required>
                            <option value="">เลือกภาคธุรกิจ...</option>
                            <option value="ภาคอุตสาหกรรม">ภาคอุตสาหกรรม</option>
                            <option value="ภาคการบริการ">ภาคการบริการ</option>
                            <option value="ภาคการผลิตเกษตร">ภาคการผลิตเกษตร</option>
                            <option value="ภาคการค้า">ภาคการค้า</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">รูปแบบการจดทะเบียน</label>
                        <select class="form-select" name="biz_type" required>
                            <option value="บริษัทจำกัด">บริษัทจำกัด</option>
                            <option value="ห้างหุ้นส่วนจำกัด">ห้างหุ้นส่วนจำกัด</option>
                            <option value="บุคคลธรรมดา">บุคคลธรรมดา</option>
                            <option value="วิสาหกิจชุมชน">วิสาหกิจชุมชน</option>
                        </select>
                    </div>

                    <div class="section-title">ท่านทราบข่าวจากที่ใด?</div>
                    <div class="mb-3">
                        <select class="form-select" name="source" id="sourceSelect" onchange="toggleSourceOther(this.value)" required>
                            <option value="">เลือกช่องทาง...</option>
                            <option value="งานอบรม/สัมนา">1. งานอบรม/สัมนา</option>
                            <option value="งานแสดงสินค้า/event">2. งานแสดงสินค้า/event</option>
                            <option value="สื่อออนไลน์เช่น Facebook, line">3. สื่อออนไลน์เช่น Facebook, line</option>
                            <option value="OSS จังหวัด">4. OSS จังหวัด</option>
                            <option value="อื่นๆ">5. อื่นๆ (โปรดระบุ)</option>
                        </select>
                        <div id="source_other_div" class="mt-2" style="display: none;">
                            <input type="text" class="form-control border-primary" id="source_other_text" placeholder="ระบุช่องทางอื่นๆ">
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="btn-submit mt-4 py-3">บันทึกข้อมูล</button>
                </form>
                <div id="statusMsg" class="text-center mt-3" style="display:none;"></div>
            </div>
        </div>
    </div>

    <script>
        function toggleSme(show) { document.getElementById('sme_input_div').style.display = show ? 'block' : 'none'; }
        
        function toggleSourceOther(value) {
            const otherDiv = document.getElementById('source_other_div');
            const otherInput = document.getElementById('source_other_text');
            if (value === 'อื่นๆ') {
                otherDiv.style.display = 'block';
                otherInput.required = true;
            } else {
                otherDiv.style.display = 'none';
                otherInput.required = false;
                otherInput.value = '';
            }
        }

        document.getElementById('regForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('statusMsg');

            let sourceValue = this.source.value;
            if (sourceValue === 'อื่นๆ') {
                sourceValue = 'อื่นๆ: ' + document.getElementById('source_other_text').value;
            }

            const formData = {
                "TIME_STAMP": new Date().toLocaleString('th-TH'),
                "ID_Card": this.id_card.value,
                "FIRST_NAME": this.first_name.value,
                "LAST_NAME": this.last_name.value,
                "PHONE": this.phone.value,
                "EMAIL": this.email.value,
                "COMPANY": this.company.value,
                "PROVINCE": this.province.value,
                "ID_COMPANY": this.tax_id.value,
                "ONE_ID": this.sme_number.value || "ไม่มี",
                "TSIC": this.tsic.value,
                "BUSINESS_TYPE": this.biz_type.value,
                "CHANNEL": sourceValue
            };

            btn.disabled = true;
            status.style.display = 'block';
            status.innerHTML = "กำลังส่งข้อมูล...";

            fetch("https://api.sheetbest.com/sheets/757bb012-f8e9-46bc-b55d-50eb6c0ca6f5", {
                method: "POST",
                mode: "cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(formData),
            })
            .then((r) => r.json())
            .then(() => {
                alert("บันทึกข้อมูลสำเร็จ!");
                btn.disabled = false;
                status.style.display = 'none';
                document.getElementById('regForm').reset();
                toggleSme(false);
                document.getElementById('source_other_div').style.display = 'none';
            })
            .catch((err) => {
                console.error(err);
                alert("เกิดข้อผิดพลาด");
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
