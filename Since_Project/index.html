<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบฟอร์มลงทะเบียนโครงการ BDS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8 col-xl-6">
                <div class="card mt-3">
                    <div class="card-body p-4">
                        <div class="logo-container">
                            <img src="https://i.postimg.cc/wvzd1LqR/logo-BDS-Background-Removed.png" alt="Logo"
                                class="logo-img">
                        </div>
                        <h4 class="text-center text-primary mb-4">โครงการส่งเสริมผู้ประกอบการผ่านระบบ BDS</h4>
                        <form id="regForm">
                            <div class="section-title">ส่วนที่ 1: ข้อมูลส่วนตัว</div>
                            <div class="mb-3">
                                <label class="form-label">เลขประจำตัวประชาชน (13 หลัก)</label>
                                <input type="text" class="form-control" name="id_card" pattern="[0-9]{13}" required>
                            </div>

                            <div class="row">
                                <div>
                                    <label class="form-label"
                                        style="font-weight: bold; margin-right: 15px;">คำนำหน้า</label>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="title" value="นาย" required>
                                        <label class="form-check-label">นาย</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="title" value="นาง">
                                        <label class="form-check-label">นาง</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="title" value="นางสาว">
                                        <label class="form-check-label">นางสาว</label>
                                    </div>
                                </div>
                                <div class="col-12 col-md-6 mb-3">
                                    <label class="form-label">ชื่อ</label>
                                    <input type="text" class="form-control" name="first_name" required>
                                </div>
                                <div class="col-12 col-md-6 mb-3">
                                    <label class="form-label">นามสกุล</label>
                                    <input type="text" class="form-control" name="last_name" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-12 col-md-6 mb-3">
                                    <label class="form-label">เบอร์โทรศัพท์</label>
                                    <input type="tel" class="form-control" name="phone" required>
                                </div>
                                <div class="col-12 col-md-6 mb-3">
                                    <label class="form-label">อีเมล</label>
                                    <input type="email" class="form-control" name="email">
                                </div>
                            </div>

                            <div class="section-title">ส่วนที่ 2: ข้อมูลธุรกิจ</div>
                            <div class="mb-3"><label class="form-label">ชื่อกิจการ</label><input type="text"
                                    class="form-control" name="company" required></div>
                            <div class="mb-3"><label class="form-label">จังหวัดที่ตั้งกิจการ</label><input type="text"
                                    class="form-control" name="province" required></div>
                            <div class="mb-3">
                                <label class="form-label">เลขทะเบียนกิจการ</label>
                                <input type="text" class="form-control" id="tax_id" name="tax_id"
                                    pattern="^[0-9]{12,13}$" inputmode="numeric" maxlength="13" minlength="12" required>
                                <div class="invalid-feedback">กรุณากรอกเลขทะเบียนกิจการ 12 หรือ 13 หลัก (เฉพาะตัวเลข)
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label d-block">เลข SME One ID</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="sme_status" value="ไม่มี" checked
                                        onclick="toggleSme(false)">
                                    <label class="form-check-label">ไม่มี</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="sme_status" value="มี"
                                        onclick="toggleSme(true)">
                                    <label class="form-check-label">มี</label>
                                </div>
                                <div id="sme_input_div" class="mt-2" style="display: none;">
                                    <input type="text" class="form-control" id="sme_number" name="sme_number"
                                        pattern="^[0-9]{12,13}$" inputmode="numeric" maxlength="13" minlength="12"
                                        placeholder="กรอกเลข SME One ID">
                                    <div class="invalid-feedback">กรุณากรอกเลข SME One ID 12 หรือ 13 หลัก (เฉพาะตัวเลข)
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">ข้อมูล TSIC ภาคธุรกิจ</label>
                                <select class="form-select" name="tsic" required>
                                    <option value="ภาคอุตสาหกรรม">ภาคอุตสาหกรรม</option>
                                    <option value="ภาคการบริการ">ภาคการบริการ</option>
                                    <option value="ภาคการผลิตเกษตร">ภาคการผลิตเกษตร</option>
                                    <option value="ภาคการค้า">ภาคการค้า</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">รูปแบบการจดทะเบียน</label>
                                <select class="form-select" name="biz_type" required>
                                    <option value="บริษัทจำกัด">บริษัทจำกัด</option>
                                    <option value="ห้างหุ้นส่วนจำกัด">ห้างหุ้นส่วนจำกัด</option>
                                    <option value="บุคคลธรรมดา">บุคคลธรรมดา</option>
                                    <option value="วิสาหกิจชุมชน">วิสาหกิจชุมชน</option>
                                </select>
                            </div>

                            <div class="section-title">ท่านทราบข่าวจากที่ใด?</div>
                            <div class="mb-3">
                                <select class="form-select" name="source" id="sourceSelect"
                                    onchange="toggleSourceOther(this.value)" required>
                                    <option value="">เลือกช่องทาง...</option>
                                    <option value="งานอบรม/สัมนา">1. งานอบรม/สัมนา</option>
                                    <option value="งานแสดงสินค้า/event">2. งานแสดงสินค้า/event</option>
                                    <option value="สื่อออนไลน์เช่น Facebook, line">3. สื่อออนไลน์เช่น Facebook, line
                                    </option>
                                    <option value="OSS จังหวัด">4. OSS จังหวัด</option>
                                    <option value="อื่นๆ">5. อื่นๆ (โปรดระบุ)</option>
                                </select>
                                <div id="source_other_div" class="mt-2" style="display: none;">
                                    <input type="text" class="form-control border-primary" id="source_other_text"
                                        placeholder="ระบุช่องทางอื่นๆ">
                                </div>
                            </div>

                            <button type="submit" id="submitBtn" class="btn-submit mt-4 py-3">บันทึกข้อมูล</button>
                        </form>
                        <div id="statusMsg" class="text-center mt-3" style="display:none;"></div>
                        <div id="successPopup" class="text-center mt-3" style="display:none;">
                            <h2 class="text-success">ลงทะเบียนสำเร็จ!</h2>
                            <span class="text-success" style="font-size: 50px;">✔️</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="src/js/main.js"></script>
</body>

</html>
